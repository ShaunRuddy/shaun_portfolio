<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:        #0c1a2e;
    --navy-mid:    #112240;
    --navy-light:  #1a3455;
    --steel:       #2b4162;
    --grey-dark:   #1c2535;
    --grey-mid:    #3d4f62;
    --grey-light:  #7a8ea0;
    --grey-pale:   #b0c0d0;
    --white:       #e6eff8;
    --teal:        #38b2ac;
    --teal-dim:    #1f7a76;
    --gold:        #c9974a;
    --gold-dim:    #8c6530;
    --sage:        #6b9e8a;
    --sage-dim:    #3e6b59;
    --warm:        #e2c99a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    line-height: 1.6;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.35;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.1rem 4rem;
    background: rgba(12,26,46,0.88);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(56,178,172,0.12);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 3px; color: var(--teal);
  }
  .nav-links { display: flex; gap: 0.5rem; list-style: none; }
  .nav-links a {
    display: inline-block;
    padding: 0.45rem 1.1rem;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 2px;
    color: var(--grey-pale);
    text-decoration: none;
    font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
    transition: all 0.2s; background: transparent;
  }
  .nav-links a:hover {
    border-color: var(--teal); color: var(--teal);
    background: rgba(56,178,172,0.07);
  }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
    padding: 7rem 4rem 4rem;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 55% 55% at 85% 40%, rgba(56,178,172,0.06) 0%, transparent 65%),
      radial-gradient(ellipse 40% 50% at 15% 70%, rgba(201,151,74,0.04) 0%, transparent 60%);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(56,178,172,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,178,172,0.035) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 25%, transparent 70%);
  }
  .hero-inner {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    max-width: 1100px; width: 100%;
  }
  .hero-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; letter-spacing: 4px;
    color: var(--teal); text-transform: uppercase;
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 1rem;
    opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
  }
  .hero-eyebrow::before {
    content: ''; display: block; width: 40px; height: 1px; background: var(--teal);
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 12vw, 10rem);
    line-height: 0.9; letter-spacing: 2px; color: var(--white);
    opacity: 0; animation: fadeUp 0.8s 0.4s forwards;
  }
  h1 span { color: var(--teal); display: block; }
  .hero-sub {
    margin-top: 1.8rem; font-size: 1rem; color: var(--grey-pale);
    max-width: 520px; line-height: 1.75;
    opacity: 0; animation: fadeUp 0.8s 0.6s forwards;
  }
  .hero-sub strong { color: var(--warm); font-weight: 500; }
  .hero-cta {
    margin-top: 2rem; display: flex; gap: 1rem;
    opacity: 0; animation: fadeUp 0.8s 0.8s forwards;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.85rem 2rem; border-radius: 2px;
    font-size: 0.78rem; font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; text-decoration: none;
    transition: all 0.25s; cursor: pointer; border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-primary { background: var(--teal); color: var(--navy); }
  .btn-primary:hover {
    background: var(--warm); transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(56,178,172,0.25);
  }
  .btn-outline { background: transparent; color: var(--grey-pale); border: 1px solid rgba(255,255,255,0.18); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

  /* ── HERO STAT CARDS ── */
  .hero-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.2rem;
    margin-top: 2.8rem;
    opacity: 0; animation: fadeUp 0.8s 1s forwards;
    max-width: 860px;
  }
  .hero-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 1.8rem 1.6rem;
    position: relative; overflow: hidden;
    transition: border-color 0.25s, background 0.25s;
  }
  .hero-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
  }
  .hero-card.card-edu::before  { background: var(--teal); }
  .hero-card.card-exp::before  { background: var(--gold); }
  .hero-card.card-role::before { background: var(--sage); }
  .hero-card:hover { background: rgba(255,255,255,0.055); border-color: rgba(255,255,255,0.15); }
  .hc-icon { font-size: 1.4rem; margin-bottom: 0.8rem; display: block; }
  .hc-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .card-edu  .hc-label { color: var(--teal); }
  .card-exp  .hc-label { color: var(--gold); }
  .card-role .hc-label { color: var(--sage); }
  .hc-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: 1px; color: var(--white);
    line-height: 1.1; margin-bottom: 0.5rem;
  }
  .hc-detail { font-size: 0.76rem; color: var(--grey-light); line-height: 1.55; }

  /* ── SECTIONS ── */
  section { padding: 7rem 4rem; position: relative; }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem; letter-spacing: 4px; color: var(--teal);
    text-transform: uppercase;
    display: flex; align-items: center; gap: 1rem; margin-bottom: 0.8rem;
  }
  .section-label::after { content: ''; flex: 1; max-width: 55px; height: 1px; background: var(--teal); }
  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4rem); letter-spacing: 2px; line-height: 1;
    margin-bottom: 3rem; color: var(--white);
  }

  /* ── ABOUT ── */
  #about { background: var(--navy-mid); }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 5rem; align-items: start; max-width: 1200px; margin: 0 auto;
  }
  .about-text p { color: var(--grey-pale); margin-bottom: 1.2rem; font-size: 0.97rem; line-height: 1.8; }
  .about-text p strong { color: var(--warm); font-weight: 500; }
  .edu-cards { display: flex; flex-direction: column; gap: 1rem; }
  .edu-card {
    background: rgba(56,178,172,0.04); border: 1px solid rgba(56,178,172,0.12);
    border-left: 3px solid var(--teal); padding: 1.4rem; transition: background 0.2s;
  }
  .edu-card:hover { background: rgba(56,178,172,0.08); }
  .edu-degree { font-size: 0.7rem; font-family: 'DM Mono', monospace; color: var(--teal); letter-spacing: 1px; margin-bottom: 0.3rem; }
  .edu-title { font-weight: 500; color: var(--white); font-size: 0.93rem; }
  .edu-school { color: var(--grey-light); font-size: 0.82rem; margin-top: 0.2rem; }

  /* ── SKILLS ── */
  #skills { background: var(--navy); }
  .skills-container { max-width: 1200px; margin: 0 auto; }
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(255px,1fr)); gap: 1.4rem; }
  .skill-group {
    background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.06);
    padding: 1.8rem; transition: border-color 0.2s, transform 0.2s;
  }
  .skill-group:hover { border-color: rgba(56,178,172,0.22); transform: translateY(-3px); }
  .skill-group-title {
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 1.1rem;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 0.45rem; }
  .tag {
    display: inline-block; padding: 0.3rem 0.75rem;
    border: 1px solid rgba(255,255,255,0.09);
    font-size: 0.76rem; color: var(--grey-pale); font-family: 'DM Mono', monospace;
    transition: all 0.2s;
  }
  .tag:hover { border-color: var(--teal); color: var(--teal); }

  /* ── EXPERIENCE ── */
  #experience { background: var(--navy-mid); }
  .exp-container { max-width: 900px; margin: 0 auto; }
  .exp-item {
    display: grid; grid-template-columns: 175px 1fr;
    gap: 3rem; margin-bottom: 3.5rem; padding-bottom: 3.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .exp-item:last-child { border-bottom: none; }
  .exp-meta { text-align: right; }
  .exp-date { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--gold); letter-spacing: 1px; margin-bottom: 0.4rem; }
  .exp-company { font-size: 0.83rem; color: var(--grey-light); }
  .exp-role { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 1rem; color: var(--white); }
  .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .exp-bullets li { color: var(--grey-pale); font-size: 0.88rem; line-height: 1.65; padding-left: 1.2rem; position: relative; }
  .exp-bullets li::before { content: '▸'; position: absolute; left: 0; color: var(--sage); font-size: 0.68rem; top: 0.22rem; }

  /* ── PROJECTS ── */
  #projects { background: var(--navy); }
  .projects-container { max-width: 1300px; margin: 0 auto; }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(330px,1fr)); gap: 1.4rem; }
  .project-card {
    background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.07);
    overflow: hidden; transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .project-card:hover { transform: translateY(-6px); border-color: rgba(56,178,172,0.28); box-shadow: 0 20px 55px rgba(0,0,0,0.38); }
  .project-img-placeholder {
    width: 100%; height: 190px;
    background: linear-gradient(135deg, var(--navy-light) 0%, var(--steel) 100%);
    display: flex; align-items: center; justify-content: center; font-size: 2.8rem;
  }
  .project-body { padding: 1.7rem; }
  .project-tag { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 3px; color: var(--sage); text-transform: uppercase; margin-bottom: 0.5rem; }
  .project-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 1px; color: var(--white); margin-bottom: 0.75rem; }
  .project-desc { color: var(--grey-pale); font-size: 0.86rem; line-height: 1.65; margin-bottom: 1rem; }
  .project-result { background: rgba(56,178,172,0.05); border-left: 2px solid var(--teal); padding: 0.55rem 0.85rem; font-size: 0.78rem; color: var(--grey-pale); font-style: italic; }
  .project-card.wide { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; }
  .project-card.wide .project-img-placeholder { height: 100%; min-height: 220px; }
  .project-card.wide .project-media { min-height: 220px; height: 100%; }

  .project-category { margin-bottom: 3.5rem; }
  .project-category:last-of-type { margin-bottom: 0; }
  .project-category-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 3vw, 2.1rem);
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 0.45rem;
  }
  .project-category-desc {
    font-size: 0.88rem;
    color: var(--grey-light);
    margin-bottom: 1.5rem;
    max-width: 720px;
    line-height: 1.55;
  }
  .project-media {
    width: 100%;
    min-height: 190px;
    background: linear-gradient(135deg, var(--navy-light) 0%, var(--steel) 55%);
    overflow: hidden;
    align-self: stretch;
  }
  .project-media--single img {
    width: 100%;
    height: 100%;
    min-height: 190px;
    object-fit: cover;
    display: block;
  }
  .project-media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
    gap: 3px;
    min-height: 190px;
    height: 100%;
  }
  .project-media-grid img {
    width: 100%;
    height: 100%;
    min-height: 100px;
    object-fit: cover;
    display: block;
  }

  /* ── CONTACT ── */
  #contact { background: var(--navy-mid); text-align: center; }
  .contact-inner { max-width: 600px; margin: 0 auto; }
  .contact-inner p { color: var(--grey-pale); margin-bottom: 2.5rem; font-size: 0.97rem; line-height: 1.75; }
  .contact-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 2.5rem; }
  .contact-link {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.8rem 1.6rem; border: 1px solid rgba(255,255,255,0.12);
    color: var(--grey-pale); text-decoration: none;
    font-size: 0.8rem; font-family: 'DM Mono', monospace; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .contact-link:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,151,74,0.05); }

  /* ── FOOTER ── */
  footer {
    background: var(--navy); padding: 2rem 4rem;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .footer-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 3px; color: var(--grey-light); }
  .footer-copy { font-size: 0.72rem; color: var(--grey-mid); font-family: 'DM Mono', monospace; }

  .divider { width: 100%; height: 1px; background: linear-gradient(to right, transparent, rgba(56,178,172,0.18), transparent); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  /* ── RESPONSIVE ── */
  @media (max-width: 850px) {
    nav { padding: 1rem 1.5rem; }
    section { padding: 5rem 1.5rem; }
    #hero { padding: 6rem 1.5rem 3rem; }
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    .exp-item { grid-template-columns: 1fr; gap: 0.5rem; }
    .exp-meta { text-align: left; }
    .hero-cards { grid-template-columns: 1fr; }
    .project-card.wide { grid-column: span 1; grid-template-columns: 1fr; }
    .project-card.wide .project-img-placeholder { height: 190px; min-height: 190px; }
    .project-card.wide .project-media { min-height: 190px; height: 190px; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
    .nav-links { gap: 0.3rem; }
    .nav-links a { padding: 0.4rem 0.7rem; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<nav id="site-nav" aria-label="Primary"></nav>

<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-inner" id="hero-root"></div>
</section>

<div class="divider"></div>

<section id="about">
  <div class="about-grid" id="about-root"></div>
</section>

<div class="divider"></div>

<section id="skills">
  <div class="skills-container" id="skills-root"></div>
</section>

<div class="divider"></div>

<section id="experience">
  <div class="exp-container" id="experience-root"></div>
</section>

<div class="divider"></div>

<section id="projects">
  <div class="projects-container" id="projects-root"></div>
</section>

<div class="divider"></div>

<section id="contact">
  <div class="contact-inner" id="contact-root"></div>
</section>

<footer id="site-footer"></footer>

<script>
(function () {
  const HERO_CARD_ICONS = ['🎓', '💼', '🤖'];
  const HERO_CARD_CLASSES = ['card-edu', 'card-exp', 'card-role'];
  const CONTACT_ICON = { email: '✉', phone: '📞', linkedin: 'in' };

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function contactLinkLabel(type, label) {
    if (type === 'linkedin') return CONTACT_ICON.linkedin + ' LinkedIn';
    return CONTACT_ICON[type] + ' ' + label;
  }

  function renderNav(meta, navigation) {
    const nav = document.getElementById('site-nav');
    const ul = document.createElement('ul');
    ul.className = 'nav-links';
    navigation.forEach((item) => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = item.href;
      a.textContent = item.label;
      li.appendChild(a);
      ul.appendChild(li);
    });
    nav.innerHTML = '';
    const logo = document.createElement('div');
    logo.className = 'nav-logo';
    logo.textContent = meta.initials;
    nav.appendChild(logo);
    nav.appendChild(ul);
  }

  function renderHero(data) {
    const h = data.hero;
    const headline = h.headline;
    const subtitleHtml = h.subtitleHtml || h.subtitle;

    let ctaHtml = '';
    h.cta.forEach((btn) => {
      const cls = btn.style === 'primary' ? 'btn btn-primary' : 'btn btn-outline';
      ctaHtml += `<a href="${escapeHtml(btn.href)}" class="${cls}">${escapeHtml(btn.label)}</a>`;
    });

    let cardsHtml = '';
    h.summaryCards.forEach((card, i) => {
      const cardClass = HERO_CARD_CLASSES[i] || 'card-edu';
      const icon = HERO_CARD_ICONS[i] || '•';
      const detailLines = card.detail.map((line) => escapeHtml(line)).join('<br>\n');
      cardsHtml += `
      <div class="hero-card ${cardClass}">
        <span class="hc-icon">${icon}</span>
        <div class="hc-label">${escapeHtml(card.label)}</div>
        <div class="hc-value">${escapeHtml(card.value)}</div>
        <div class="hc-detail">${detailLines}</div>
      </div>`;
    });

    document.getElementById('hero-root').innerHTML = `
    <div class="hero-eyebrow">${escapeHtml(h.eyebrow)}</div>
    <h1>${escapeHtml(headline.line1)}<span>${escapeHtml(headline.line2)}</span></h1>
    <p class="hero-sub">${subtitleHtml}</p>
    <div class="hero-cta">${ctaHtml}</div>
    <div class="hero-cards">${cardsHtml}</div>`;
  }

  function renderAbout(data) {
    const a = data.about;
    const headlineHtml = escapeHtml(a.headline).replace(/\n/g, '<br>');
    let parasHtml = '';
    (a.paragraphsHtml || []).forEach((html) => {
      parasHtml += `<p>${html}</p>`;
    });

    let eduHtml = '';
    data.education.forEach((edu) => {
      eduHtml += `
      <div class="edu-card">
        <div class="edu-degree">${escapeHtml(edu.degree)} · ${escapeHtml(edu.years)}</div>
        <div class="edu-title">${escapeHtml(edu.title)}</div>
        <div class="edu-school">${escapeHtml(edu.school)}</div>
      </div>`;
    });

    document.getElementById('about-root').innerHTML = `
    <div class="about-text reveal">
      <div class="section-label">${escapeHtml(a.sectionLabel)}</div>
      <h2>${headlineHtml}</h2>
      ${parasHtml}
    </div>
    <div class="edu-cards reveal">
      <div class="section-label">Education</div>
      ${eduHtml}
    </div>`;
  }

  function renderSkills(data) {
    const s = data.skills;
    let groupsHtml = '';
    s.groups.forEach((g) => {
      let tags = '';
      g.items.forEach((t) => {
        tags += `<span class="tag">${escapeHtml(t)}</span>`;
      });
      groupsHtml += `
      <div class="skill-group">
        <div class="skill-group-title">${escapeHtml(g.title)}</div>
        <div class="skill-tags">${tags}</div>
      </div>`;
    });

    document.getElementById('skills-root').innerHTML = `
    <div class="section-label">${escapeHtml(s.sectionLabel)}</div>
    <h2>${escapeHtml(s.headline)}</h2>
    <div class="skills-grid reveal">${groupsHtml}</div>`;
  }

  function renderExperience(data) {
    const e = data.experience;
    let itemsHtml = '';
    e.roles.forEach((role) => {
      let bullets = '';
      role.bullets.forEach((b) => {
        bullets += `<li>${escapeHtml(b)}</li>`;
      });
      itemsHtml += `
    <div class="exp-item reveal">
      <div class="exp-meta">
        <div class="exp-date">${escapeHtml(role.dateRange)}</div>
        <div class="exp-company">${escapeHtml(role.company)}<br>${escapeHtml(role.location)}</div>
      </div>
      <div>
        <div class="exp-role">${escapeHtml(role.title)}</div>
        <ul class="exp-bullets">${bullets}</ul>
      </div>
    </div>`;
    });

    document.getElementById('experience-root').innerHTML = `
    <div class="section-label">${escapeHtml(e.sectionLabel)}</div>
    <h2>${escapeHtml(e.headline)}</h2>
    ${itemsHtml}`;
  }

  function normalizeProjectImage(img) {
    if (typeof img === 'string' && img.trim()) return { src: img.trim(), alt: '' };
    if (img && typeof img.src === 'string' && img.src.trim()) {
      return { src: img.src.trim(), alt: (img.alt || '').trim() };
    }
    return null;
  }

  function getProjectImages(proj) {
    if (!Array.isArray(proj.images)) return [];
    return proj.images.map(normalizeProjectImage).filter(Boolean);
  }

  function renderProjectMedia(proj) {
    const imgs = getProjectImages(proj);
    const ph = proj.placeholder || {};
    if (imgs.length > 0) {
      if (imgs.length === 1) {
        const alt = imgs[0].alt || proj.title;
        return `<div class="project-media project-media--single"><img src="${escapeHtml(imgs[0].src)}" alt="${escapeHtml(alt)}" loading="lazy" decoding="async"></div>`;
      }
      let inner = '';
      imgs.forEach((im) => {
        inner += `<img src="${escapeHtml(im.src)}" alt="${escapeHtml(im.alt || proj.title)}" loading="lazy" decoding="async">`;
      });
      return `<div class="project-media project-media--multi"><div class="project-media-grid">${inner}</div></div>`;
    }
    if (proj.layout === 'wide' && ph.emoji && ph.label) {
      return `<div class="project-img-placeholder" style="background:linear-gradient(135deg,#0d2137 0%,#1a3455 100%);font-size:0.9rem;color:var(--grey-pale);letter-spacing:1px;flex-direction:column;gap:0.6rem;">
          <span style="font-size:3rem">${ph.emoji}</span>${escapeHtml(ph.label)}
        </div>`;
    }
    return `<div class="project-img-placeholder">${ph.emoji || ''}</div>`;
  }

  function renderProjectCard(proj) {
    const wide = proj.layout === 'wide';
    const cardClass = wide ? 'project-card wide reveal' : 'project-card reveal';
    const mediaHtml = renderProjectMedia(proj);
    const tagLine = proj.tags.map((t) => escapeHtml(t)).join(' · ');
    let bodyHtml = `
        <div class="project-tag">${tagLine}</div>
        <div class="project-title">${escapeHtml(proj.title)}</div>
        <p class="project-desc">${escapeHtml(proj.description)}</p>`;
    if (proj.constraints && proj.constraints.items && proj.constraints.items.length) {
      const constraintText = proj.constraints.items.map((x) => escapeHtml(x)).join(' · ');
      bodyHtml += `<p class="project-desc"><strong style="color:var(--warm)">${escapeHtml(proj.constraints.label)}:</strong> ${constraintText}</p>`;
    }
    bodyHtml += `<div class="project-result">${escapeHtml(proj.result)}</div>`;
    return `<div class="${cardClass}">${mediaHtml}<div class="project-body">${bodyHtml}</div></div>`;
  }

  function renderProjects(data) {
    const p = data.projects;
    const labels = p.categories || {};
    const order = ['hardware', 'software'];
    let html = `
    <div class="section-label">${escapeHtml(p.sectionLabel)}</div>
    <h2>${escapeHtml(p.headline)}</h2>`;

    order.forEach((key) => {
      const items = p[key];
      if (!items || !items.length) return;
      const cat = labels[key] || { title: key, description: '' };
      let gridHtml = '';
      items.forEach((proj) => {
        gridHtml += renderProjectCard(proj);
      });
      const descHtml = cat.description
        ? `<p class="project-category-desc">${escapeHtml(cat.description)}</p>`
        : '';
      html += `
    <div class="project-category">
      <h3 class="project-category-title">${escapeHtml(cat.title)}</h3>
      ${descHtml}
      <div class="projects-grid">${gridHtml}</div>
    </div>`;
    });

    document.getElementById('projects-root').innerHTML = html;
  }

  function renderContact(data) {
    const c = data.contact;
    let linksHtml = '';
    c.links.forEach((link) => {
      const target = link.type === 'linkedin' ? ' target="_blank" rel="noopener noreferrer"' : '';
      const text = contactLinkLabel(link.type, link.label);
      linksHtml += `<a href="${escapeHtml(link.href)}" class="contact-link"${target}>${escapeHtml(text)}</a>`;
    });

    document.getElementById('contact-root').innerHTML = `
    <div class="section-label" style="justify-content:center">${escapeHtml(c.sectionLabel)}</div>
    <h2>${escapeHtml(c.headline)}</h2>
    <p>${escapeHtml(c.body)}</p>
    <div class="contact-links reveal">${linksHtml}</div>
    <p style="font-size:0.78rem;color:var(--grey-mid)">${escapeHtml(c.footerNote)}</p>`;
  }

  function renderFooter(data) {
    const f = data.footer;
    document.getElementById('site-footer').innerHTML = `
    <div class="footer-name">${escapeHtml(f.name)}</div>
    <div class="footer-copy">${escapeHtml(f.credentials)}</div>`;
  }

  function initReveal() {
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 75);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });
    reveals.forEach((el) => observer.observe(el));

    document.querySelectorAll('.skills-grid, .projects-grid, .edu-cards').forEach((grid) => {
      grid.querySelectorAll('.reveal').forEach((el, i) => {
        el.style.transitionDelay = `${i * 0.07}s`;
      });
    });
  }

  async function main() {
    const res = await fetch('content.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('Failed to load content.json');
    const data = await res.json();

    document.title = data.meta.pageTitle;
    renderNav(data.meta, data.navigation);
    renderHero(data);
    renderAbout(data);
    renderSkills(data);
    renderExperience(data);
    renderProjects(data);
    renderContact(data);
    renderFooter(data);
    initReveal();
  }

  main().catch((err) => {
    console.error(err);
    document.body.insertAdjacentHTML(
      'afterbegin',
      '<p style="padding:2rem;background:#421;color:#fff;font-family:sans-serif">Could not load content. Open this page via a local server (e.g. <code>npx serve</code>) so <code>content.json</code> can be fetched.</p>'
    );
  });
})();
</script>
</body>
</html>
